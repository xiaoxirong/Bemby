name: Publish Docker image

on:
  push:
    tags:
      - 'v*.*.*'
      - 'dev-*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag override (e.g. v0.9.6 or dev-v0.9.27-1)'
        required: false

jobs:
  # Resolve the tag once so both build jobs use identical values
  meta:
    runs-on: ubuntu-latest
    outputs:
      semver: ${{ steps.resolve.outputs.semver }}
      push_latest: ${{ steps.resolve.outputs.push_latest }}
    steps:
      - name: Resolve image tag
        id: resolve
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          # dev-* tags: use as-is, no latest; release tags: strip v prefix, push latest
          if [[ "${TAG}" == dev-* ]]; then
            echo "semver=${TAG}" >> "$GITHUB_OUTPUT"
            echo "push_latest=false" >> "$GITHUB_OUTPUT"
          else
            echo "semver=${TAG#v}" >> "$GITHUB_OUTPUT"
            echo "push_latest=true" >> "$GITHUB_OUTPUT"
          fi

  # Build each platform natively -- no QEMU
  build:
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/bemby:${{ needs.meta.outputs.semver }}-${{ matrix.suffix }}
          cache-from: type=gha,scope=${{ matrix.suffix }}
          cache-to:   type=gha,scope=${{ matrix.suffix }},mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.meta.outputs.semver }}
            org.opencontainers.image.revision=${{ github.sha }}

  # Merge the two platform images into a single multi-arch manifest
  merge:
    needs: [meta, build]
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create and push multi-platform manifest
        run: |
          IMG="${{ secrets.DOCKERHUB_USERNAME }}/bemby"
          VER="${{ needs.meta.outputs.semver }}"
          # latest is only updated by release tags (v*.*.*), not dev builds
          if [ "${{ needs.meta.outputs.push_latest }}" = "true" ]; then
            docker buildx imagetools create \
              -t "${IMG}:${VER}" \
              -t "${IMG}:latest" \
              "${IMG}:${VER}-amd64" \
              "${IMG}:${VER}-arm64"
          else
            docker buildx imagetools create \
              -t "${IMG}:${VER}" \
              -t "${IMG}:dev" \
              "${IMG}:${VER}-amd64" \
              "${IMG}:${VER}-arm64"
          fi
